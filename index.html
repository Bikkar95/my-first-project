<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Beautiful Multi-Form Page</title>
    <style>
        /* पूरे पेज की सेटिंग */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* लेफ्ट साइड का मेन डिब्बा */
        .left-side {
            flex: 1.2;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* पीछे का धुंधला बैकग्राउंड */
        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(15px);
            transform: scale(1.1);
            z-index: 1;
        }

        /* बीच की असली खड़ी इमेज */
        .main-img {
            position: relative;
            z-index: 2;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* राइट side: फॉर्म्स का एरिया */
        .right-side {
            flex: 0.8;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* फॉर्म का डिब्बा */
        .form-container {
            width: 100%;
            max-width: 400px;
            /* 💡 जादू की शुरुआत: शुरू में फॉर्म छिपे रहें, इसलिए हमने यह सेटिंग की */
            display: none; 
        }

        /* 💡 जो फॉर्म एक्टिव होगा, सिर्फ वही दिखेगा */
        .form-container.active {
            display: block;
        }

        .form-container h2 {
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }

        .form-container p {
            margin-bottom: 25px;
            color: #666;
            font-size: 14px;
        }

        /* इनपुट बॉक्स (Username & Password) */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
        }

        /* बटन्स */
        .action-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover {
            background-color: #0056b3;
        }

        /* लिंक्स */
        .extra-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .extra-links a {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        /* 📱 मोबाइल के लिए सेटिंग */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-side {
                display: none;
            }
            .right-side {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <!-- लेफ्ट साइड: इमेज -->
    <div class="left-side">
        <div class="blur-bg" style="background-image: url('my-bg.png');"></div>
        <img src="my-bg.png" alt="Background" class="main-img">
    </div>

    <!-- राइट साइड: यहाँ हमारे तीनों फॉर्म्स हैं -->
    <div class="right-side">
        
        <!-- 1. LOGIN FORM -->
        <div class="form-container active" id="login-form">
            <h2>Welcome Back!</h2>
            <p>Please login to your account.</p>
            <form onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label>Username / Email</label>
                    <input type="text" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="action-btn">Login</button>
            </form>
            <div class="extra-links">
                <a id="go-to-forgot">Forgot Password?</a>
                <a id="go-to-signup">Create User</a>
            </div>
        </div>

        <!-- 2. SIGN UP (CREATE USER) FORM -->
        <div class="form-container" id="signup-form">
            <h2>Create Account</h2>
            <p>Join us today! It only takes a minute.</p>
            <form onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="action-btn">Sign Up</button>
            </form>
            <div class="extra-links">
                <a class="go-to-login">Already have an account? Login</a>
            </div>
        </div>

        <!-- 3. FORGOT PASSWORD FORM -->
        <div class="form-container" id="forgot-form">
            <h2>Reset Password</h2>
            <p>Enter your email to get a reset link.</p>
            <form onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="action-btn">Send Reset Link</button>
            </form>
            <div class="extra-links">
                <a class="go-to-login">Back to Login</a>
            </div>
        </div>

    </div>

    <!-- 🔮 यहाँ से शुरू होता है JavaScript का असली जादू -->
    <script>
        // सभी फॉर्म्स को ढूंढना
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const forgotForm = document.getElementById('forgot-form');

        // सभी बटन/लिंक्स को ढूंढना
        const goToSignupLink = document.getElementById('go-to-signup');
        const goToForgotLink = document.getElementById('go-to-forgot');
        const goToLoginLinks = document.querySelectorAll('.go-to-login');

        // फंक्शन: सभी फॉर्म्स को छुपाकर सिर्फ एक को दिखाना
        function showForm(formToShow) {
            loginForm.classList.remove('active');
            signupForm.classList.remove('active');
            forgotForm.classList.remove('active');
            
            formToShow.classList.add('active');
        }

        // जब 'Create User' पर क्लिक हो
        goToSignupLink.addEventListener('click', () => {
            showForm(signupForm);
        });

        // जब 'Forgot Password' पर क्लिक हो
        goToForgotLink.addEventListener('click', () => {
            showForm(forgotForm);
        });

        // जब 'Login' वाले लिंक पर क्लिक हो (दोनों फॉर्म्स से वापस आने के लिए)
        goToLoginLinks.forEach(link => {
            link.addEventListener('click', () => {
                showForm(loginForm);
            });
        });
    </script>

</body>
</html>
